<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="fonts/weather-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Photo Slideshow -->
    <div id="photo-background"></div>
    <div id="photo-background-next"></div>
    <div class="brightness-overlay"></div>
    
    <!-- Loading Indicator -->
    <div id="loading-indicator" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; text-align: center; font-size: 2rem; text-shadow: 0 0 20px rgba(0,0,0,0.9);">
        <div style="font-size: 3rem; margin-bottom: 1rem; animation: pulse 2s ease-in-out infinite;">⏳</div>
        <div>Loading dashboard...</div>
    </div>
    
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
    </style>

    <!-- Clock (Top Left) -->
    <div id="clock">
        <div id="time">--:--</div>
        <div id="date">Loading...</div>
    </div>

    <!-- Calendar Grid (5 columns across top) -->
    <div id="calendar">
        <div class="calendar-column" data-day="0">
            <div class="column-header">
                <div class="column-date">--</div>
                <div class="column-day">Loading</div>
            </div>
            <div class="column-events"></div>
        </div>
        <div class="calendar-column" data-day="1">
            <div class="column-header">
                <div class="column-date">--</div>
                <div class="column-day">Loading</div>
            </div>
            <div class="column-events"></div>
        </div>
        <div class="calendar-column" data-day="2">
            <div class="column-header">
                <div class="column-date">--</div>
                <div class="column-day">Loading</div>
            </div>
            <div class="column-events"></div>
        </div>
        <div class="calendar-column" data-day="3">
            <div class="column-header">
                <div class="column-date">--</div>
                <div class="column-day">Loading</div>
            </div>
            <div class="column-events"></div>
        </div>
        <div class="calendar-column" data-day="4">
            <div class="column-header">
                <div class="column-date">--</div>
                <div class="column-day">Loading</div>
            </div>
            <div class="column-events"></div>
        </div>
    </div>

    <!-- Weather Details (Left Bottom) -->
    <div id="weather-details">
        <div id="current-temp">--°</div>
        <div id="feels-like">Feels like --</div>
        <div id="wind-humidity"></div>
        <div id="sun-moon">
            <div><i class="wi wi-sunrise" style="color:#FFD700;"></i> <span id="sunrise">--</span></div>
            <div><i class="wi wi-sunset" style="color:#FF6347;"></i> <span id="sunset">--</span></div>
            <div><i class="wi wi-moon-14 moon-icon" style="color:#E8E8D0;"></i> <span id="moon-phase">--</span></div>
        </div>
    </div>

    <!-- Weather Forecast (Bottom) -->
    <div id="weather-forecast">
        <div class="forecast-day" data-day="0">
            <div class="forecast-label">Today</div>
            <div class="forecast-icon"><i class="wi wi-cloudy"></i></div>
            <div class="forecast-precip"><i class="wi wi-raindrop"></i> --%</div>
            <div class="forecast-temps"><span class="high">--°</span><span class="low">--°</span></div>
        </div>
        <div class="forecast-day" data-day="1">
            <div class="forecast-label">--</div>
            <div class="forecast-icon"><i class="wi wi-cloudy"></i></div>
            <div class="forecast-precip"><i class="wi wi-raindrop"></i> --%</div>
            <div class="forecast-temps"><span class="high">--°</span><span class="low">--°</span></div>
        </div>
        <div class="forecast-day" data-day="2">
            <div class="forecast-label">--</div>
            <div class="forecast-icon"><i class="wi wi-cloudy"></i></div>
            <div class="forecast-precip"><i class="wi wi-raindrop"></i> --%</div>
            <div class="forecast-temps"><span class="high">--°</span><span class="low">--°</span></div>
        </div>
        <div class="forecast-day" data-day="3">
            <div class="forecast-label">--</div>
            <div class="forecast-icon"><i class="wi wi-cloudy"></i></div>
            <div class="forecast-precip"><i class="wi wi-raindrop"></i> --%</div>
            <div class="forecast-temps"><span class="high">--°</span><span class="low">--°</span></div>
        </div>
        <div class="forecast-day" data-day="4">
            <div class="forecast-label">--</div>
            <div class="forecast-icon"><i class="wi wi-cloudy"></i></div>
            <div class="forecast-precip"><i class="wi wi-raindrop"></i> --%</div>
            <div class="forecast-temps"><span class="high">--°</span><span class="low">--°</span></div>
        </div>
    </div>

    <!-- Admin URL hint — shown in bottom-left corner, fades after 60s -->
    <div id="admin-hint" style="
      position: fixed;
      bottom: 18px;
      left: 18px;
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.75);
      font-family: monospace;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 2s;
    ">⚙️ Admin: http://<span id="admin-hint-ip">...</span>:3000/admin.html &nbsp;·&nbsp; PIN: 123456</div>

    <script src="dashboard.js"></script>
    <script src="display-enhancements.js"></script>
    <script>
      // Populate admin hint IP and fade out after 60s
      (function() {
        fetch('/api/system-info').then(r => r.json()).then(d => {
          var ip = (d && d.ip) ? d.ip : window.location.hostname;
          document.getElementById('admin-hint-ip').textContent = ip;
        }).catch(function() {
          document.getElementById('admin-hint-ip').textContent = window.location.hostname;
        });
        setTimeout(function() {
          var el = document.getElementById('admin-hint');
          if (el) el.style.opacity = '0';
          setTimeout(function() { if (el) el.style.display = 'none'; }, 2000);
        }, 60000);
      })();
    </script>
</body>
</html>
